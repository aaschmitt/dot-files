config-version = 2

after-startup-command = [
'exec-and-forget open -a Firefox',
'exec-and-forget open -a "Google Chrome"',
'exec-and-forget open -a Slack',
'exec-and-forget open -a Ghostty',
'exec-and-forget open -a MeshClaw',
'exec-and-forget open -a "Microsoft Outlook"',
]
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

# --- App-to-workspace assignments ---
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

# https://ghostty.org/docs/help/macos-tiling-wms
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['layout floating', 'move-node-to-workspace T']

[[on-window-detected]]
if.app-id = 'com.amazon.meshclaw'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = 'move-node-to-workspace O'

[[on-window-detected]]
if.app-id = 'com.amazon.agentspaces-desktop'
run = 'move-node-to-workspace W'

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# App workspaces
ctrl-f = 'workspace F' # Firefox
ctrl-g = 'workspace C' # Chrome
ctrl-s = 'workspace S' # Slack
ctrl-q = 'workspace T' # Terminal (Ghostty)
ctrl-m = 'workspace M' # MeshClaw
ctrl-o = 'workspace O' # Outlook
ctrl-w = 'workspace W' # AgentSpaces Desktop

# Move node to app workspace
ctrl-shift-f = 'move-node-to-workspace F'
ctrl-shift-c = 'move-node-to-workspace C'
ctrl-shift-s = 'move-node-to-workspace S'
ctrl-shift-t = 'move-node-to-workspace T' # Terminal (Ghostty)
ctrl-shift-m = 'move-node-to-workspace M'
ctrl-shift-o = 'move-node-to-workspace O'
ctrl-shift-w = 'move-node-to-workspace W' # AgentSpaces Desktop

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move node to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'

# Re-sync all app windows to their assigned workspaces
ctrl-shift-r = 'exec-and-forget aerospace list-windows --all --format "%{window-id} %{app-bundle-id}" | while read wid bid; do case "$bid" in com.tinyspeck.slackmacgap) aerospace move-node-to-workspace S --window-id "$wid" ;; org.mozilla.firefox) aerospace move-node-to-workspace F --window-id "$wid" ;; com.google.Chrome) aerospace move-node-to-workspace C --window-id "$wid" ;; com.mitchellh.ghostty) aerospace move-node-to-workspace T --window-id "$wid" ;; com.amazon.meshclaw) aerospace move-node-to-workspace M --window-id "$wid" ;; com.microsoft.Outlook) aerospace move-node-to-workspace O --window-id "$wid" ;; esac; done'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
