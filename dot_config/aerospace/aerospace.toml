# AeroSpace tiling window manager
# Docs: https://nikitabobko.github.io/AeroSpace/guide
#
# Stow:  stow --target=$HOME/.config/ aerospace
# Result: ~/.config/aerospace/aerospace.toml

# ============================================================
# CORE
# ============================================================

start-at-login = true

after-startup-command = []
exec-on-workspace-change = []

# Normalize the container tree so layouts stay sane after moves/closes.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default layout when a workspace is empty.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Don't surface macOS-hidden apps when switching workspaces.
automatically-unhide-macos-hidden-apps = false

# Cursor follows focus across monitors.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ============================================================
# GAPS  (Hyprland config used gaps_in=1, gaps_out=1 — same vibe)
# ============================================================

[gaps]
inner.horizontal = 4
inner.vertical   = 4
outer.left       = 4
outer.bottom     = 4
outer.top        = 4
outer.right      = 4

# ============================================================
# KEYBINDINGS
# ============================================================
# Conflict notes (AeroSpace intercepts before Ghostty sees the key):
#   - ctrl-shift-left/right     was Ghostty prev/next tab   -> now workspace prev/next
#   - ctrl-shift-minus          was Ghostty new_split:down  -> now resize shrink
#   - ctrl-shift-backslash      was Ghostty new_split:right -> now (unbound, free)
#   - ctrl-0, ctrl-4            were Ghostty cursor remaps  -> use ctrl-a / ctrl-e directly
# Bare shift+arrows for focus will intercept text-selection shift+arrow system-wide.

[mode.main.binding]

# --- Focus (mirrors Ghostty goto_split:left/right/top/bottom) ---
shift-left  = 'focus left'
shift-down  = 'focus down'
shift-up    = 'focus up'
shift-right = 'focus right'

# --- Move focused window ---
# ctrl-alt avoids stomping Ghostty ctrl-shift-arrow tab nav muscle (which we
# redirect to workspace nav below, so move-window needs a different combo).
ctrl-alt-left  = 'move left'
ctrl-alt-down  = 'move down'
ctrl-alt-up    = 'move up'
ctrl-alt-right = 'move right'

# --- Resize ---
ctrl-shift-equal = 'resize smart +50'
ctrl-shift-minus = 'resize smart -50'

# --- Layout toggles ---
ctrl-slash = 'layout tiles horizontal vertical'
ctrl-comma = 'layout accordion horizontal vertical'

# --- Fullscreen ---
ctrl-f = 'fullscreen'

# --- Workspace switching (1-10) ---
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'
ctrl-6 = 'workspace 6'
ctrl-7 = 'workspace 7'
ctrl-8 = 'workspace 8'
ctrl-9 = 'workspace 9'
ctrl-0 = 'workspace 10'

# --- Move focused window to workspace ---
ctrl-shift-1 = 'move-node-to-workspace 1'
ctrl-shift-2 = 'move-node-to-workspace 2'
ctrl-shift-3 = 'move-node-to-workspace 3'
ctrl-shift-4 = 'move-node-to-workspace 4'
ctrl-shift-5 = 'move-node-to-workspace 5'
ctrl-shift-6 = 'move-node-to-workspace 6'
ctrl-shift-7 = 'move-node-to-workspace 7'
ctrl-shift-8 = 'move-node-to-workspace 8'
ctrl-shift-9 = 'move-node-to-workspace 9'
ctrl-shift-0 = 'move-node-to-workspace 10'

# --- Workspace cycling (reuses Ghostty's prev/next tab muscle memory) ---
ctrl-shift-left  = 'workspace prev'
ctrl-shift-right = 'workspace next'

# --- Back-and-forth between last two workspaces ---
ctrl-tab = 'workspace-back-and-forth'

# --- Enter service mode (reload/reset/float) ---
ctrl-shift-semicolon = 'mode service'

# ============================================================
# SERVICE MODE — one-shot ops, then back to main
# ============================================================

[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']
f         = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Push current workspace to next/prev monitor
shift-left  = ['move-workspace-to-monitor prev', 'mode main']
shift-right = ['move-workspace-to-monitor next', 'mode main']
